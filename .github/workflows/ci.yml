name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.task }}
        run: npm run ${{ matrix.task }}
        env:
          # Placeholder env so `lib/env.ts` parses during CI (Zod-validated).
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder?sslmode=require
          BETTER_AUTH_SECRET: ci-placeholder-ci-placeholder-ci-placeholder
          BETTER_AUTH_URL: http://localhost:3000

  build:
    name: build
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder?sslmode=require
          BETTER_AUTH_SECRET: ci-placeholder-ci-placeholder-ci-placeholder
          BETTER_AUTH_URL: http://localhost:3000
